<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <span class="material-symbols-rounded auth-card__icon">gavel</span>
      <h1>{{ ls.t('auth.login.title') }}</h1>
      <p>{{ ls.t('auth.login.subtitle') }}</p>
    </div>

    <form class="auth-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <app-input label="Email" type="email" placeholder="your@email.com" icon="mail" name="email" [(ngModel)]="email"
          [required]="true"></app-input>
      </div>

      <div class="form-group">
        <app-input [label]="ls.t('auth.login.password')" type="password" [placeholder]="ls.t('auth.login.passwordPlaceholder')" icon="lock" name="password"
          [(ngModel)]="password" [required]="true"></app-input>
      </div>

      <div class="auth-form__actions">
        <a routerLink="/forgot-password" class="auth-form__forgot">{{ ls.t('auth.login.forgot') }}</a>
      </div>

      <app-button type="submit" variant="primary" [fullWidth]="true" [loading]="isLoading" class="auth-form__submit">
        {{ ls.t('auth.login.submit') }}
      </app-button>
    </form>

    <div class="auth-card__footer">
      <span>{{ ls.t('auth.login.noAccount') }}</span>
      <a routerLink="/register">{{ ls.t('auth.login.register') }}</a>
    </div>
  </div>
</div>
