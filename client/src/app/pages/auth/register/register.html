<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <span class="material-symbols-rounded auth-card__icon">person_add</span>
      <h1>{{ ls.t('auth.register.title') }}</h1>
      <p>{{ ls.t('auth.register.subtitle') }}</p>
    </div>

    <form class="auth-form" (ngSubmit)="onRegister()">
      <div class="form-row">
        <div class="form-group">
          <app-input [label]="ls.t('auth.register.firstName')" type="text" placeholder="..." icon="person" name="firstName" [(ngModel)]="firstName" [required]="true"></app-input>
        </div>
        <div class="form-group">
          <app-input [label]="ls.t('auth.register.lastName')" type="text" placeholder="..." icon="person" name="lastName" [(ngModel)]="lastName" [required]="true"></app-input>
        </div>
      </div>

      <div class="form-group">
        <app-input label="Email" type="email" placeholder="your@email.com" icon="mail" name="email" [(ngModel)]="email" [required]="true"></app-input>
      </div>

      <div class="form-group">
        <app-input [label]="ls.t('auth.register.phone')" type="text" placeholder="+380 __ ___ __ __" icon="phone" name="phone" [(ngModel)]="phone"></app-input>
      </div>

      <div class="form-group">
        <app-input [label]="ls.t('auth.register.password')" type="password" placeholder="..." icon="lock" name="password" [(ngModel)]="password" [required]="true"></app-input>
      </div>

      <div class="form-group">
        <app-input [label]="ls.t('auth.register.confirm')" type="password" placeholder="..." icon="lock" name="confirmPassword" [(ngModel)]="confirmPassword" [required]="true"></app-input>
      </div>

      <app-button type="submit" variant="primary" [fullWidth]="true" [loading]="isLoading" class="auth-form__submit">
        {{ ls.t('auth.register.submit') }}
      </app-button>
    </form>

    <div class="auth-card__footer">
      <span>{{ ls.t('auth.register.hasAccount') }}</span>
      <a routerLink="/login">{{ ls.t('auth.register.login') }}</a>
    </div>
  </div>
</div>
